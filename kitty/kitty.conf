# Use the non-Mono JetBrainsMono Nerd Font so powerline separators (e.g. the
# rounded caps  ) render at their natural double-width and stay rounded.
# The "Mono" variant force-fits every glyph into one cell and clips the curves.
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Gruvbox dark colorscheme (morhetz) ---------------------------------
# background = gruvbox bg0 (#282828): the classic warm dark-gray backdrop.
background            #282828
foreground            #ebdbb2
cursor                #ebdbb2
cursor_text_color     #282828
selection_background  #ebdbb2
selection_foreground  #282828

# normal
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984
# bright
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2d
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2
