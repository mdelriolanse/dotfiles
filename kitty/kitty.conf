# Use the non-Mono JetBrainsMono Nerd Font so powerline separators (e.g. the
# rounded caps  ) render at their natural double-width and stay rounded.
# The "Mono" variant force-fits every glyph into one cell and clips the curves.
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Black glass look ----------------------------------------------------
# Translucent window with a near-black tint and a blurred backdrop so the
# terminal reads like a pane of smoked glass. background_opacity is the
# see-through amount; background_blur frosts whatever is behind it (needs a
# compositor that supports it: KWin/KDE, Hyprland, macOS). dynamic_ lets you
# nudge opacity live with ctrl+shift+a > m / l.
background_opacity        0.80
background_blur           64
dynamic_background_opacity yes

# --- Gruvbox dark colorscheme (morhetz) ---------------------------------
# background pushed toward black (from gruvbox bg0 #282828) so the tint stays
# dark and glassy rather than washing out warm-gray when the wallpaper shows through.
background            #0d0e0f
foreground            #ebdbb2
cursor                #ebdbb2
cursor_text_color     #282828
selection_background  #ebdbb2
selection_foreground  #282828

# normal
color0  #282828
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984
# bright
color8  #928374
color9  #fb4934
color10 #b8bb26
color11 #fabd2d
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# --- Powerline tab bar ---------------------------------------------------
# Slanted powerline separators between tabs, matching the starship prompt.
tab_bar_style        powerline
tab_powerline_style  slanted
tab_bar_edge         bottom
tab_title_template   " {index}: {title} "
active_tab_foreground   #0d0e0f
active_tab_background   #d79921
active_tab_font_style   bold
inactive_tab_foreground #a89984
inactive_tab_background #282828
inactive_tab_font_style normal
